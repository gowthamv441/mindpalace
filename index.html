<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>75 Hard Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --card2: #1e222b;
    --accent: #f2542d;
    --accent2: #4cc9a7;
    --text: #eef0f3;
    --muted: #8b93a1;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 4px 0;
    letter-spacing: -0.02em;
  }
  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 18px;
  }
  .summary {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    flex: 1;
    min-width: 90px;
    text-align: center;
  }
  .stat .num {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent2);
  }
  .stat .label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .progress-bar {
    height: 8px;
    background: var(--card2);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
  }
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 14px;
  }
  .day-nav button {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 1rem;
    cursor: pointer;
  }
  .day-nav button:disabled { opacity: 0.3; cursor: default; }
  .day-title { text-align: center; }
  .day-title .n { font-size: 1.1rem; font-weight: 700; }
  .day-title .status { font-size: 0.75rem; color: var(--muted); }
  .habits {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .habit {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s;
  }
  .habit.done {
    border-color: var(--accent2);
    background: #172420;
  }
  .habit .check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
  }
  .habit.done .check {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0f1115;
  }
  .habit .label { font-size: 0.95rem; flex: 1; }
  .grid-section h2 {
    font-size: 0.95rem;
    color: var(--muted);
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    margin-bottom: 20px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 5px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--muted);
    cursor: pointer;
    background: var(--card2);
  }
  .cell.complete {
    background: var(--accent2);
    color: #0f1115;
    border-color: var(--accent2);
    font-weight: 700;
  }
  .cell.partial {
    background: #3a3020;
    border-color: var(--accent);
    color: var(--accent);
  }
  .cell.today {
    outline: 2px solid #fff;
    outline-offset: 1px;
  }
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px;
    font-size: 0.8rem;
    cursor: pointer;
    margin-top: 10px;
  }
  .loading { color: var(--muted); text-align: center; padding: 30px; }
  .chart-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .chart-section h2 {
    font-size: 0.95rem;
    color: var(--muted);
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chart-section canvas { max-height: 220px; }
</style>
</head>
<body>

<h1>75 Hard</h1>
<div class="sub">6 habits · 75 days · no exceptions</div>

<div id="app" class="loading">Loading...</div>

<script>
const HABITS = [
  { key: 'eat', label: 'Eat clean' },
  { key: 'water', label: 'Drink 2 litres of water' },
  { key: 'upskill', label: 'Upskill 1 hour' },
  { key: 'meditate', label: 'Meditate 30 mins' },
  { key: 'sleep', label: 'Sleep 7 hours' },
  { key: 'workout', label: 'Workout' },
];
const TOTAL_DAYS = 75;
const STORAGE_KEY = '75hard-data';

let state = {
  currentDay: 1,
  days: {} // { "1": {eat:true, water:false, ...} }
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    }
  } catch (e) {
    // no existing data, start fresh
  }
  render();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save failed', e);
  }
}

function getDay(n) {
  return state.days[n] || {};
}

function isDayComplete(n) {
  const d = getDay(n);
  return HABITS.every(h => d[h.key]);
}

function completedCount(n) {
  const d = getDay(n);
  return HABITS.filter(h => d[h.key]).length;
}

function toggleHabit(day, key) {
  if (!state.days[day]) state.days[day] = {};
  state.days[day][key] = !state.days[day][key];
  saveState();
  render();
}

function goToDay(n) {
  if (n < 1 || n > TOTAL_DAYS) return;
  state.currentDay = n;
  saveState();
  render();
}

function calcStats() {
  let fullDays = 0;
  let currentStreak = 0;
  let streakBroken = false;
  for (let i = 1; i <= TOTAL_DAYS; i++) {
    if (isDayComplete(i)) {
      fullDays++;
      if (!streakBroken) currentStreak++;
    } else {
      if (state.days[i] && Object.keys(state.days[i]).length > 0 && !isDayComplete(i)) {
        // partial or incomplete day encountered
      }
      streakBroken = true;
    }
  }
  return { fullDays, currentStreak };
}

function resetAll() {
  if (!confirm('Reset all 75 Hard progress? This cannot be undone.')) return;
  state = { currentDay: 1, days: {} };
  saveState();
  render();
}

function render() {
  const app = document.getElementById('app');
  const day = state.currentDay;
  const dayData = getDay(day);
  const complete = isDayComplete(day);
  const { fullDays, currentStreak } = calcStats();
  const pct = Math.round((fullDays / TOTAL_DAYS) * 100);

  let gridCells = '';
  for (let i = 1; i <= TOTAL_DAYS; i++) {
    const c = completedCount(i);
    let cls = 'cell';
    if (c === HABITS.length) cls += ' complete';
    else if (c > 0) cls += ' partial';
    if (i === day) cls += ' today';
    gridCells += `<div class="${cls}" onclick="goToDay(${i})">${i}</div>`;
  }

  let habitsHtml = '';
  HABITS.forEach(h => {
    const done = !!dayData[h.key];
    habitsHtml += `
      <div class="habit ${done ? 'done' : ''}" onclick="toggleHabit(${day}, '${h.key}')">
        <div class="check">${done ? '✓' : ''}</div>
        <div class="label">${h.label}</div>
      </div>`;
  });

  app.className = '';
  app.innerHTML = `
    <div class="summary">
      <div class="stat"><div class="num">${fullDays}/${TOTAL_DAYS}</div><div class="label">Days done</div></div>
      <div class="stat"><div class="num">${currentStreak}</div><div class="label">Streak</div></div>
      <div class="stat"><div class="num">${pct}%</div><div class="label">Progress</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="day-nav">
      <button onclick="goToDay(${day - 1})" ${day <= 1 ? 'disabled' : ''}>←</button>
      <div class="day-title">
        <div class="n">Day ${day} / ${TOTAL_DAYS}</div>
        <div class="status">${complete ? 'Complete ✓' : completedCount(day) + '/6 done'}</div>
      </div>
      <button onclick="goToDay(${day + 1})" ${day >= TOTAL_DAYS ? 'disabled' : ''}>→</button>
    </div>

    <div class="habits">${habitsHtml}</div>

    <div class="grid-section">
      <h2>All 75 days</h2>
      <div class="grid">${gridCells}</div>
    </div>

    <div class="chart-section">
      <h2>Daily completion trend</h2>
      <canvas id="trendChart"></canvas>
    </div>

    <div class="chart-section">
      <h2>Per-habit consistency</h2>
      <canvas id="habitChart"></canvas>
    </div>

    <button class="reset-btn" onclick="resetAll()">Reset all progress</button>
  `;

  renderCharts();
}

let trendChartInstance = null;
let habitChartInstance = null;

function renderCharts() {
  if (typeof Chart === 'undefined') {
    console.warn('Chart.js failed to load; skipping charts.');
    return;
  }
  // Only chart up through the furthest day that has any data, plus current day
  let maxDayWithData = state.currentDay;
  for (let i = 1; i <= TOTAL_DAYS; i++) {
    if (state.days[i] && Object.keys(state.days[i]).length > 0) maxDayWithData = Math.max(maxDayWithData, i);
  }

  const labels = [];
  const trendData = [];
  for (let i = 1; i <= maxDayWithData; i++) {
    labels.push(i);
    trendData.push(completedCount(i));
  }

  const habitLabels = HABITS.map(h => h.label);
  const habitCounts = HABITS.map(h => {
    let count = 0;
    for (let i = 1; i <= TOTAL_DAYS; i++) {
      if (getDay(i)[h.key]) count++;
    }
    return count;
  });

  const trendCtx = document.getElementById('trendChart');
  const habitCtx = document.getElementById('habitChart');
  if (!trendCtx || !habitCtx) return;

  if (trendChartInstance) trendChartInstance.destroy();
  if (habitChartInstance) habitChartInstance.destroy();

  const gridColor = '#2a2f3a';
  const textColor = '#8b93a1';

  trendChartInstance = new Chart(trendCtx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Habits completed',
        data: trendData,
        borderColor: '#4cc9a7',
        backgroundColor: 'rgba(76,201,167,0.15)',
        fill: true,
        tension: 0.25,
        pointRadius: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: HABITS.length, ticks: { stepSize: 1, color: textColor }, grid: { color: gridColor } },
        x: { ticks: { color: textColor, maxTicksLimit: 10 }, grid: { color: gridColor } }
      }
    }
  });

  habitChartInstance = new Chart(habitCtx, {
    type: 'bar',
    data: {
      labels: habitLabels,
      datasets: [{
        label: 'Days completed',
        data: habitCounts,
        backgroundColor: '#f2542d',
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { min: 0, max: TOTAL_DAYS, ticks: { color: textColor }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } }
      }
    }
  });
}

loadState();
</script>
</body>
</html>
